services:
  app:
    image: ${IMAGE:?}:${TAG:?}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - testnet

  test:
    image: ubuntu:noble
    command:
      - bash
      - -c
      - |
        # Install test tools
        curl -fsSL https://github.com/Orange-OpenSource/hurl/releases/download/7.1.0/hurl_7.1.0_amd64.deb -o /tmp/hurl.deb
        sudo dpkg -i /tmp/hurl.deb
        # Run tests against the started service
        hurl --test --variable base_url=app:3000 tests/
    depends_on:
      app:
        condition: service_healthy
    networks:
      - testnet
