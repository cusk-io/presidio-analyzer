name: GHCR Cleanup

on:
  workflow_dispatch:
  #schedule:
  #  - cron: "0 7 * * *" # Run daily 7am UTC

jobs:
  cleanup-all:
    runs-on: ubuntu-latest
    name: Delete old sha-* tags and unreferenced untagged images
    steps:
      - uses: quartx-analytics/ghcr-cleaner@v1
        with:
          owner-type: org # or 'user' for a personal account
          token: ${{ secrets.GHT_PAT_CONTAINER_RETENTION_POLICY }}
          repository-owner: ${{ github.repository_owner }}

          # Target: Clean up images across all packages
          #package-name: "*"
          package-name: "presidio-analyzer"

          # 1. Delete truly unreferenced untagged images (multi-arch safe)
          delete-untagged: true

          # 2. For tagged images, keep only the 5 most recent that match our CI patterns
          keep-at-most: 5
          filter-tags: "sha-*,otherprefix*"

          # 3. CRITICAL: Never delete these tags, using wildcards for broad protection
          skip-tags: "latest,buildcache-*,v*"

          dry-run: true # !! Set to false after reviewing the log output !!

