name: Build and Push Presidio Analyzer

on:
  push:
    tags:
      - 'presidio-analyzer-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/presidio-analyzer-}" >> $GITHUB_OUTPUT

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/cusk/presidio-analyzer:${{ steps.vars.outputs.VERSION }}
            ghcr.io/cusk/presidio-analyzer:latest
          platforms: linux/amd64,linux/arm64